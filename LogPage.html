<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Login / Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    /* background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); */
    background-image:url("bg.jpg");
    background-repeat:no-repeat;
    background-size: cover;
}

.container{
    width:850px;
    height:520px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    display:flex;
}

.left-box,.right-box{
    width:50%;
    padding:50px;
}

.left-box{
    background:linear-gradient(135deg,#890b99,#fe00a5);

    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.left-box h1{
    font-size:32px;
    margin-bottom:15px;
}

.left-box p{
    font-size:16px;
    margin-bottom:25px;
    line-height:1.5;
}

.switch-btn{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#fff;
    color:#333;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.switch-btn:hover{
    transform:scale(1.05);
}

.right-box{
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box{
    width:100%;
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px 15px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-box input:focus{
    border-color:#4facfe;
}

.forgot{
    text-align:right;
    margin-bottom:15px;
}

.forgot a{
    text-decoration:none;
    color:#4facfe;
    font-size:14px;
    font-weight:bold;
}

.forgot a:hover{
    color:#007bff;
    text-decoration:underline;
}

.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#4facfe;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#007bff;
}

.hidden{
    display:none;
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    padding:30px;
    width:350px;
    border-radius:15px;
    text-align:center;
}

.popup-box h3{
    margin-bottom:15px;
}

.popup-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
}

.close-btn{
    background:red;
    color:#fff;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

@media(max-width:768px){
    .container{
        width:95%;
        height:auto;
        flex-direction:column;
    }

    .left-box,.right-box{
        width:100%;
        padding:30px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left-box">
        <h1 id="title">Welcome Back!</h1>
        <p id="text">To stay connected with us please login with your personal info</p>
        <button class="switch-btn" onclick="toggleForm()">Sign Up</button>
    </div>

    <!-- Right Side -->
    <div class="right-box">

        <!-- Login -->
        <div class="form-box" id="loginForm">
            <h2>Login</h2>

            <div class="input-box">
                <input type="email" placeholder="Email">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>

            <div class="forgot">
                <a href="#" onclick="openPopup()">Forgot Password?</a>
            </div>

            <button class="submit-btn">Login</button>
        </div>

        <!-- Signup -->
        <div class="form-box hidden" id="signupForm">
            <h2>Create Account</h2>

            <div class="input-box">
                <input type="text" placeholder="Full Name">
            </div>

            <div class="input-box">
                <input type="email" placeholder="Email">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>

            <button class="submit-btn">Sign Up</button>
        </div>

    </div>

</div>

<!-- Forgot Password Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Reset Password</h3>
        <input type="email" placeholder="Enter your Email">
        <button class="submit-btn">Send Reset Link</button><br>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function toggleForm(){
    let login = document.getElementById("loginForm");
    let signup = document.getElementById("signupForm");
    let title = document.getElementById("title");
    let text = document.getElementById("text");
    let btn = document.querySelector(".switch-btn");

    if(login.classList.contains("hidden")){
        login.classList.remove("hidden");
        signup.classList.add("hidden");
        title.innerText="Log in!";
        text.innerText="please login with your personal info";
        btn.innerText="Create Account";
        
    }else{
        signup.classList.remove("hidden");
        login.classList.add("hidden");
        title.innerText="hi!";
        text.innerText="Enter your details and sign up";
        btn.innerText="Login";
    }
}

function openPopup(){
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
