<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #one {
            width: auto;
            height: 300px;
            border: 5px solid rgb(227, 25, 25);
        }
    </style>
</head>
<body>
    <div id="one">
        <button>button 1</button>
        <button>button 2</button>
    </div>

    <script>
        // Select the div
        let div = document.getElementById("#one");

        let btn1 = document.createElement("button");
        div.insertAdjacentElement("beforebegin", btn1);
        btn1.innerText = "button3";

        let btn2 = document.createElement("button");
        div.insertAdjacentElement("beforeend", btn2);
        btn2.innerText = "button4";

        let btn3 = document.createElement("button");
        div.insertAdjacentElement("afterbegin", btn3);
        btn3.innerText = "button5";

        let btn4 = document.createElement("button");
        div.insertAdjacentElement("afterend", btn4);
        btn4.innerText = "button6";
    </script>
</body>
</html>
