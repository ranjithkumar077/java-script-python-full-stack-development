<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Event Object</h1>
  <button>click me</button>

  <script>
    function buyingTickets(event) {
      console.dir(event.ctrlKey);  // logs whether Ctrl was pressed
      if (event.ctrlKey) {
        let h1 = document.querySelector("h1");
        h1.innerText = "Ready for movie";
      }
    }

    let btn = document.querySelector("button");
    btn.addEventListener("click", buyingTickets);
  </script>
</body>
</html>
