<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url(bg.jpg);
}

.container {
    width: 360px;
    background: rgba(255, 255, 255, 0.441);
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    background-color: #e2d0efa1;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px 2px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.btn-primary { background: #4CAF50; color: white; }
.btn-danger { background: red; color: white; }
.btn-secondary { background: gray; color: white; }

.link1 {
    color: blue;
    cursor: pointer;
    font-size: 14px;
    float:inline-end;
}
.link2 {
    color: blue;
    cursor: pointer;
    font-size: 14px;
    float:left;
}

.hidden {
    display: none;
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">

        <button class="btn-primary" onclick="login()">Login</button>
        <button class="btn-secondary" onclick="clearLogin()">Clear</button>
        <button class="btn-danger" onclick="exitApp()">Exit</button>

        <p class="link1" onclick="showForm('forgotForm')">Forgot Password?</p>
        <p class="link2" onclick="showForm('registerForm')">New User? Register</p>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <h2>Register</h2>
        <input type="text" id="regUser" placeholder="Username">
        <input type="password" id="regPass" placeholder="Password">

        <select id="designation">
            <option value="student">Student</option>
              <option value="student">Faculty</option>
        </select>

        <button class="btn-primary" onclick="register()">Register</button>
        <button class="btn-secondary" onclick="clearRegister()">Clear</button>
        <button class="btn-danger" onclick="showForm('loginForm')">Close</button>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotForm" class="hidden">
        <h2>Reset Password</h2>
        <input type="password" id="newPass" placeholder="New Password">
        <input type="password" id="confirmPass" placeholder="Confirm Password">

        <button class="btn-primary" onclick="resetPassword()">Update</button>
        <button class="btn-danger" onclick="showForm('loginForm')">Close</button>
    </div>

</div>

<script>

// Show forms
function showForm(formId) {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("forgotForm").classList.add("hidden");

    document.getElementById(formId).classList.remove("hidden");
}

// Login function
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    if(user === "" || pass === "") {
        alert("Please fill all fields");
    } else {
        alert("Login Successful (Demo)");
    }
}

// Register function
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user === "" || pass === "") {
        alert("Fill all fields");
    } else {
        alert("Registered Successfully");
        showForm('loginForm');
    }
}

// Reset Password
function resetPassword() {
    let newPass = document.getElementById("newPass").value;
    let confirmPass = document.getElementById("confirmPass").value;

    if(newPass === "" || confirmPass === "") {
        alert("Fill all fields");
    } else if(newPass !== confirmPass) {
        alert("Passwords do not match");
    } else {
        alert("Password Updated");
        showForm('loginForm');
    }
}

// Clear functions
function clearLogin() {
    document.getElementById("loginUser").value = "";
    document.getElementById("loginPass").value = "";
}

function clearRegister() {
    document.getElementById("regUser").value = "";
    document.getElementById("regPass").value = "";
}

// Exit
function exitApp() {
    alert("Exit button clicked (Cannot close browser for security reasons)");
}

</script>

</body>
</html>
