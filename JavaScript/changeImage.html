// getattribute
function changeImage() {
  // 1. Select all images with the class 'iron'
  let images = document.querySelectorAll(".iron");
  
  // 2. Define the two image paths
  const oldImg = "iron-man-mark-iii-3840x2160-20054.jpg";
  const newImg = "marvel-rivals-iron-man-3840x2160-16120.jpg";

  // 3. Loop through each image
  for (let i of images) {
    // Check if the current src contains the new image name
    if (i.getAttribute("src") === newImg) {
      // Switch back to OLD
      i.setAttribute("src", oldImg);
      i.style.width = "300px";
      i.style.height = "200px";
    } else {
      // Switch to NEW
      i.setAttribute("src", newImg);
      i.style.width = "500px";
      i.style.height = "300px";
    }
  }
}
